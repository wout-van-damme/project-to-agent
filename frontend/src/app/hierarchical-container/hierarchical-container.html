<div class="p-4">
  <div class="d-flex align-items-center mb-3">
    <h1 class="mb-0">Workspaces</h1>
    <div class="ms-3">
      <button
        type="button"
        class="btn btn-success text-white rounded-circle d-flex align-items-center justify-content-center p-0 plus-button"
        (click)="openModal()"
      ><i class="fa-solid fa-plus"></i></button>
    </div>
  </div>

  @for (node of nodes(); track node.id) {
    <app-content-node [node]="node" (nodeAdded)="loadNodes()" />
  }
</div>

@if (showModal) {
  <div class="modal d-block" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add new node</h5>
          <button type="button" class="btn-close" (click)="closeModal()"></button>
        </div>
        <form (ngSubmit)="onSubmit()">
          <div class="modal-body">
            <div class="mb-3">
              <label for="typeSelect" class="form-label">Type</label>
              <select id="typeSelect" class="form-select" [(ngModel)]="selectedType" name="type" disabled>
                <option value="workspace">Workspace</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="titleInput" class="form-label">Title</label>
              <input id="titleInput" type="text" class="form-control" [(ngModel)]="title" name="title" />
            </div>
            <div class="mb-3">
              <label for="descriptionTextarea" class="form-label">Description</label>
              <textarea id="descriptionTextarea" class="form-control" rows="3" [(ngModel)]="description" name="description"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-success text-white px-3">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="modal-backdrop fade show" (click)="closeModal()"></div>
}
