<h1>TEST1</h1>
<div class="container py-4">
  <button
    type="button"
    class="btn btn-link p-0 mb-4 back-button"
    (click)="goBack()"
  >
    <i class="fa-solid fa-arrow-left fa-2x"></i>
  </button>

  @if ((node$ | async); as node) {
    <div class="card">
      <div class="card-body">
        <span class="badge bg-secondary mb-2">{{ node.type }}</span>
        <h3>{{ node.title }}</h3>
        @if (node.description) {
          <div class="text-muted mt-3" [innerHTML]="renderMarkdown(node.description)"></div>
        }
      </div>
    </div>
  }
</div>
