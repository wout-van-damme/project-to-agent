<div class="container py-4">
  <button
    type="button"
    class="btn btn-link p-0 mb-4 back-button"
    (click)="goBack()"
  >
    <i class="fa-solid fa-arrow-left fa-2x"></i>
  </button>

  @if ((node$ | async); as node) {
    
    <div class="d-flex align-items-center">
      <h1>{{ node.title }}</h1>
      <span class="badge bg-secondary">{{ node.type }}</span>  

      @if (!editMode) {
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary edit-button ms-3"
          (click)="startEdit(node.description)"
        >
          <i class="fa-solid fa-pen-to-square"></i> Edit
        </button>
      }
    </div>

    <hr>

    <div class="task-description">
      @if (editMode) {
        <textarea
          class="form-control description-textarea"
          [(ngModel)]="editDescription"
          rows="10"
        ></textarea>
        <div class="mt-2">
          <button
            type="button"
            class="btn btn-sm btn-primary me-2"
            (click)="saveEdit()"
          >
            Save
          </button>
          <button
            type="button"
            class="btn btn-sm btn-secondary"
            (click)="cancelEdit()"
          >
            Cancel
          </button>
        </div>
      } @else {
        <div [innerHTML]="renderMarkdown(node.description)"></div>
      }
    </div>

    <div class="comments-section">
      <h4>Comments</h4>

      <div class="mb-4">
        @for (comment of (comments$ | async); track comment.id) {
          <div class="card comment-card mb-2">
            <div class="card-body py-2 px-3">
              <small class="text-muted">{{ comment.created_at | date:'medium' }}</small>
              <div>{{ comment.content }}</div>
            </div>
          </div>
        } @empty {
          <p class="text-muted">No comments yet.</p>
        }
      </div>

      <div>
        <textarea
          class="form-control mb-2"
          [(ngModel)]="newComment"
          placeholder="Write a comment..."
          rows="3"
        ></textarea>
        <button
          type="button"
          class="btn btn-primary btn-sm"
          (click)="addComment()"
          [disabled]="!newComment.trim()"
        >
          <i class="fa-solid fa-plus"></i> Add Comment
        </button>
      </div>
    </div>
  }
</div>
