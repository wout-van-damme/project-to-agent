<div class="comments-section">
  <h4>Comments</h4>

  <div class="mb-4">
    @for (comment of (comments$ | async); track comment.id) {
      <div class="card comment-card mb-2">
        <div class="card-body py-2 px-3">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <span class="sender">{{ comment.sender }}</span>
              <small class="text-muted"> - {{ comment.created_at | date:'medium' }}</small>
            </div>
            <div>
              <button
                type="button"
                class="btn btn-link btn-sm p-0 me-2"
                (click)="startEdit(comment)"
                title="Edit comment"
              >
                <i class="fa-solid fa-pen-to-square"></i>
              </button>
              <button
                type="button"
                class="btn btn-link btn-sm p-0 text-danger"
                (click)="deleteComment(comment.id)"
                title="Delete comment"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </div>
          @if (editingCommentId === comment.id) {
            <div class="mt-2">
              <textarea
                class="form-control mb-2"
                [(ngModel)]="editingContent"
                rows="6"
              ></textarea>
              <button
                type="button"
                class="btn btn-primary btn-sm me-2"
                (click)="saveEdit(comment.id)"
                [disabled]="!editingContent.trim()"
              >
                <i class="fa-solid fa-check"></i> Save
              </button>
              <button
                type="button"
                class="btn btn-secondary btn-sm"
                (click)="cancelEdit()"
              >
                <i class="fa-solid fa-xmark"></i> Cancel
              </button>
            </div>
          } @else {
            <div [innerHTML]="renderMarkdown(comment.content)"></div>
          }
        </div>
      </div>
    } @empty {
      <p class="text-muted">No comments yet.</p>
    }
  </div>

  <div>
    <textarea
      class="form-control mb-2"
      [(ngModel)]="newComment"
      placeholder="Write a comment..."
      rows="3"
    ></textarea>
    <button
      type="button"
      class="btn btn-primary btn-sm"
      (click)="addComment()"
      [disabled]="!newComment.trim()"
    >
      <i class="fa-solid fa-plus"></i> Add Comment
    </button>
  </div>
</div>
